<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="0.5" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="860" height="360" fill="#f8fafc"/>
  <rect x="0" y="0" width="860" height="58" fill="url(#hero)"/>
  <text x="30" y="37" fill="white" font-size="22" font-weight="800">🏡 Immo Eliza — Deployment Architecture</text>

  <!-- User -->
  <g filter="url(#shadow)">
    <rect x="30" y="130" width="140" height="100" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <text x="100" y="170" text-anchor="middle" font-size="30">👥</text>
  <text x="100" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Users</text>
  <text x="100" y="218" text-anchor="middle" font-size="11" fill="#64748b">agents · clients</text>

  <!-- Streamlit -->
  <g filter="url(#shadow)">
    <rect x="240" y="110" width="180" height="140" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <rect x="240" y="110" width="180" height="8" rx="4" fill="#059669"/>
  <text x="330" y="150" text-anchor="middle" font-size="26">🖥️</text>
  <text x="330" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">Streamlit app</text>
  <text x="330" y="200" text-anchor="middle" font-size="11" fill="#64748b">Buy 🏠 / Rent 🔑 tabs</text>
  <text x="330" y="216" text-anchor="middle" font-size="11" fill="#64748b">Streamlit Community Cloud</text>
  <text x="330" y="236" text-anchor="middle" font-size="10" fill="#94a3b8">offline fallback → local model</text>

  <!-- FastAPI -->
  <g filter="url(#shadow)">
    <rect x="490" y="110" width="180" height="140" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
  </g>
  <rect x="490" y="110" width="180" height="8" rx="4" fill="#2563eb"/>
  <text x="580" y="150" text-anchor="middle" font-size="26">⚙️</text>
  <text x="580" y="180" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">FastAPI</text>
  <text x="580" y="200" text-anchor="middle" font-size="11" fill="#64748b">POST /predict?market=…</text>
  <text x="580" y="216" text-anchor="middle" font-size="11" fill="#64748b">🐳 Docker · Render</text>
  <text x="580" y="236" text-anchor="middle" font-size="10" fill="#94a3b8">/docs · /health · /schema</text>

  <!-- Models -->
  <g filter="url(#shadow)">
    <rect x="730" y="130" width="100" height="100" rx="14" fill="#0f172a"/>
  </g>
  <text x="780" y="168" text-anchor="middle" font-size="24">🧠</text>
  <text x="780" y="192" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">XGBoost</text>
  <text x="780" y="208" text-anchor="middle" font-size="10" fill="#93c5fd">sale · rent</text>
  <text x="780" y="222" text-anchor="middle" font-size="9" fill="#64748b">.joblib pipelines</text>

  <!-- Arrows -->
  <line x1="172" y1="180" x2="236" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="422" y1="180" x2="486" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="672" y1="180" x2="726" y2="180" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="204" y="172" text-anchor="middle" font-size="10" fill="#475569">HTTPS</text>
  <text x="454" y="172" text-anchor="middle" font-size="10" fill="#475569">JSON</text>
  <text x="699" y="172" text-anchor="middle" font-size="10" fill="#475569">predict()</text>

  <text x="430" y="322" text-anchor="middle" font-size="12" fill="#94a3b8">
    29-feature scikit-learn pipeline (impute → one-hot → scale → XGBoost) · trained per market in immo-eliza-ml
  </text>
</svg>

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install OpenMP runtime (for XGBoost)
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -t immo-eliza-api ./api

      - name: Smoke-test the container
        run: |
          docker run -d --rm -p 8010:8000 --name immo immo-eliza-api
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8010/ | grep -q alive; then echo "API up"; break; fi
            sleep 2
          done
          curl -fsS http://localhost:8010/health
          python scripts/smoke_test_api.py http://localhost:8010
          docker stop immo
